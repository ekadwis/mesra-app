<!DOCTYPE html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasil Akhir Pemeriksaan</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/pemeriksaan_fisik_pasien.css" />
  </head>

  <body>
    <div class="main-wrapper">
      <!-- HEADER -->
      <div class="header-section">
        <button class="btn-back" onclick="handleBack()">←</button>

        <div>
          <h2>Hasil Akhir Pemeriksaan</h2>
          <div>Dashboard Bidan / Hasil Pemeriksaan</div>
        </div>
      </div>

      <!-- CARD -->
      <div class="list-card">
        <!-- SEARCH -->
        <div
          style="
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
          "
        >
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              placeholder="Cari nama pasien"
              onkeyup="filterTable()"
            />
          </div>
        </div>

        <!-- TABLE -->
        <div>
          <table class="table-custom">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama Pasien</th>
                <th>Catatan Bidan</th>
                <th>Aksi</th>
              </tr>
            </thead>

            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- MODAL TAMBAH CATATAN -->
    <div class="modal fade" id="modalCatatan" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Tambah Catatan Bidan</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="idPasien" />

            <div class="mb-3">
              <label>Nama Pasien</label>
              <input
                type="text"
                id="namaPasien"
                class="form-control"
                readonly
              />
            </div>

            <div class="mb-3">
              <label>Catatan Bidan</label>
              <textarea
                id="catatanBidan"
                class="form-control"
                rows="4"
                placeholder="Tulis catatan pemeriksaan..."
              ></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Batal
            </button>

            <button class="btn btn-primary" onclick="simpanCatatan()">
              Simpan Catatan
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_URL =
        'https://script.google.com/macros/s/AKfycbyS6y63OBsRpR81JhII3N_GxkkTIpgCcs_sCDHXjnx5onzwNOSyIKNbYFooXnLGkCHB/exec';

      let patientData = [];
      let filteredData = [];

      function loadData() {
        fetch(API_URL, {
          method: 'POST',
          body: new URLSearchParams({
            action: 'get-data-hasil-akhir-pemeriksaan',
          }),
        })
          .then((res) => res.json())

          .then((data) => {
            if (!data.success) {
              document.getElementById('tableBody').innerHTML = `
<tr>
<td colspan="4" style="text-align:center;padding:20px;">
Data belum tersedia
</td>
</tr>
`;

              return;
            }

            patientData = data.result.map((item) => ({
              id_pasien: item.id_pasien,
              nama_pasien: item.nama_pasien,
              catatan_bidan: item.catatan_bidan,
            }));

            filteredData = [...patientData];

            renderTable();
          })

          .catch((err) => {
            alert('Gagal terhubung ke server');
            console.error(err);
          });
      }

      function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        if (filteredData.length === 0) {
          tableBody.innerHTML = `
<tr>
<td colspan="4" style="text-align:center;padding:20px;">
Data belum tersedia
</td>
</tr>
`;
          return;
        }

        filteredData.forEach((p, index) => {
          let aksiButton = '';

          if (!p.catatan_bidan) {
            aksiButton = `
<button
class="btn-action-small primary"
onclick="bukaModal('${p.id_pasien}','${p.nama_pasien}')">
Tambah Catatan
</button>
`;
          } else {
            aksiButton = `
<button class="btn-action-small secondary" disabled>
Sudah Ada
</button>
`;
          }

          const row = document.createElement('tr');

          row.innerHTML = `
<td>${index + 1}</td>
<td>${p.nama_pasien}</td>
<td>${p.catatan_bidan || '-'}</td>
<td>${aksiButton}</td>
`;

          tableBody.appendChild(row);
        });
      }

      function filterTable() {
        const value = document
          .getElementById('searchInput')
          .value.toLowerCase();

        filteredData = patientData.filter((p) =>
          p.nama_pasien.toLowerCase().includes(value)
        );

        renderTable();
      }

      function bukaModal(id, nama) {
        document.getElementById('idPasien').value = id;
        document.getElementById('namaPasien').value = nama;
        document.getElementById('catatanBidan').value = '';

        const modal = new bootstrap.Modal(
          document.getElementById('modalCatatan')
        );

        modal.show();
      }

      function simpanCatatan() {
  const id_pasien = document.getElementById('idPasien').value;
  const catatan_bidan = document.getElementById('catatanBidan').value;

  if (!catatan_bidan) {
    alert('Catatan tidak boleh kosong');
    return;
  }

  fetch(API_URL, {
    method: 'POST',
    body: new URLSearchParams({
      action: 'simpan-catatan-bidan',
      id_pasien: id_pasien,
      catatan_bidan: catatan_bidan
    }),
  })
    .then((res) => res.json())
    .then((data) => {
      if (!data.success) {
        alert(data.message);
        return;
      }

      alert('Catatan berhasil disimpan');

      const modal = bootstrap.Modal.getInstance(
        document.getElementById('modalCatatan')
      );

      modal.hide();

      // reload data dari spreadsheet
      loadData();
      location.reload();
    })
    .catch((err) => {
      alert('Gagal menyimpan catatan');
      console.error(err);
    });
}

      function handleBack() {
        window.location.href = 'dashboard_bidan.html';
      }

      document.addEventListener('DOMContentLoaded', loadData);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
